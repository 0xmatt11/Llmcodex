services:
  bridge:
    build: .
    restart: unless-stopped
    env_file: .env
    ports:
      - "3000:3000"
    volumes:
      - bridge-data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  selenium:
    image: selenium/standalone-chrome:latest
    profiles: ["selenium"]
    shm_size: 2gb
    ports:
      - "4444:4444"
    volumes:
      - selenium-profile:/home/seluser/profile

volumes:
  bridge-data:
  selenium-profile:
